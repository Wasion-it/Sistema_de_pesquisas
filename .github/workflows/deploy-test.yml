name: Validação de testes

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - release
      - 'release/**'
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Preparar ambiente
    uses: ./.github/workflows/includes-environment.yml
    with:
      environment: test

  approval:
    name: Aprovação do fluxo
    needs: setup
    uses: ./.github/workflows/includes-approval.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}

  test:
    name: Validar projeto
    needs: [setup, approval]
    uses: ./.github/workflows/includes-test.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      python_version: '3.12'

  build:
    name: Empacotar aplicação
    needs: [setup, test]
    uses: ./.github/workflows/includes-build.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      python_version: '3.12'

  deploy:
    name: Validar pacote de entrega
    needs: [setup, build]
    uses: ./.github/workflows/includes-deploy.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      artifact_name: 'sistema-de-pesquisas-bundle'

  report:
    name: Resumo final
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [setup, approval, test, build, deploy]
    steps:
      - name: Gerar resumo
        shell: bash
        run: |
          {
            echo '## Fluxo de testes concluído'
            echo ''
            echo "- Projeto: ${{ needs.setup.outputs.project }}"
            echo "- Ambiente: ${{ needs.setup.outputs.environment }}"
            echo "- Aprovação: ${{ needs.approval.outputs.approval-status }}"
            echo "- Testes: ${{ needs.test.result }}"
            echo "- Build: ${{ needs.build.result }}"
            echo "- Deploy: ${{ needs.deploy.result }}"
          } >> "$GITHUB_STEP_SUMMARY"