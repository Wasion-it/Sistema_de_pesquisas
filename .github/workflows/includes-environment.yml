name: Preparar ambiente

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de execução'
        required: false
        type: string
        default: 'none'
      sumary_enabled:
        description: 'Habilitar resumo'
        required: false
        type: boolean
        default: true
      update_cache:
        description: 'Atualizar cache'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      environment:
        description: 'Ambiente de execução'
        required: false
        type: string
        default: 'none'
      sumary_enabled:
        description: 'Habilitar resumo'
        required: false
        type: boolean
        default: false
      update_cache:
        description: 'Atualizar cache'
        required: false
        type: boolean
        default: false
    outputs:
      project:
        description: 'Nome do projeto'
        value: ${{ jobs.environment.outputs.project }}
      environment:
        description: 'Ambiente de execução'
        value: ${{ jobs.environment.outputs.environment }}
      python_version:
        description: 'Versão do Python'
        value: ${{ jobs.environment.outputs.python_version }}
      node_version:
        description: 'Versão do Node.js'
        value: ${{ jobs.environment.outputs.node_version }}
      backend_directory:
        description: 'Diretório do backend'
        value: ${{ jobs.environment.outputs.backend_directory }}
      frontend_directory:
        description: 'Diretório do frontend'
        value: ${{ jobs.environment.outputs.frontend_directory }}
      formattedTime:
        description: 'Timestamp formatado'
        value: ${{ jobs.environment.outputs.formattedTime }}

jobs:
  environment:
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.meta.outputs.project }}
      environment: ${{ steps.meta.outputs.environment }}
      python_version: ${{ steps.meta.outputs.python_version }}
      node_version: ${{ steps.meta.outputs.node_version }}
      backend_directory: ${{ steps.meta.outputs.backend_directory }}
      frontend_directory: ${{ steps.meta.outputs.frontend_directory }}
      formattedTime: ${{ steps.time.outputs.formattedTime }}
    steps:
      - name: Definir metadados do projeto
        id: meta
        shell: bash
        run: |
          echo "project=Sistema de Pesquisas" >> "$GITHUB_OUTPUT"
          echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          echo "python_version=3.12" >> "$GITHUB_OUTPUT"
          echo "node_version=20" >> "$GITHUB_OUTPUT"
          echo "backend_directory=backend" >> "$GITHUB_OUTPUT"
          echo "frontend_directory=frontend" >> "$GITHUB_OUTPUT"

      - name: Obter timestamp atual
        id: time
        uses: josStorer/get-current-time@v2.1.2
        with:
          format: 'YYYY-MM-DD HH:mm:ss'
          timezone: 'America/Manaus'

      - name: Resumo
        if: ${{ inputs.sumary_enabled }}
        shell: bash
        run: |
          {
            echo '## Ambiente preparado'
            echo ''
            echo "- Projeto: Sistema de Pesquisas"
            echo "- Ambiente: ${{ inputs.environment }}"
            echo "- Python: 3.12"
            echo "- Node: 20"
            echo "- Backend: backend"
            echo "- Frontend: frontend"
          } >> "$GITHUB_STEP_SUMMARY"