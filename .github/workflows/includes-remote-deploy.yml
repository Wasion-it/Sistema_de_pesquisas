name: Deploy direto no servidor

on:
  workflow_call:
    inputs:
      environment:
        description: 'Nome do ambiente'
        required: true
        type: string
      runner_label:
        description: 'Label do runner interno usado para executar o deploy'
        required: false
        type: string
        default: 'self-hosted'
      artifact_name:
        description: 'Nome do artefato a ser validado'
        required: false
        type: string
        default: 'sistema-de-pesquisas-bundle'
      deploy_host:
        description: 'Host do servidor de deploy'
        required: true
        type: string
      deploy_user:
        description: 'Usuário do servidor de deploy'
        required: true
        type: string
      deploy_path:
        description: 'Diretório de deploy no servidor'
        required: true
        type: string

    secrets:
      DEPLOY_PROD_SSH_KEY:
        required: true
      LDAP_BIND_PASSWORD:
        required: true

    outputs:
      deploy_result:
        description: 'Resultado do deploy'
        value: ${{ jobs.deploy.result }}

jobs:
  environment:
    name: Preparar ambiente
    uses: ./.github/workflows/includes-environment.yml
    with:
      environment: ${{ inputs.environment }}

  deploy:
    name: Enviar fonte e publicar no servidor
    runs-on: ${{ inputs.runner_label }}
    environment: ${{ inputs.environment }}
    needs: environment
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: deploy-package

      - name: Verificar conteúdo do pacote
        shell: bash
        run: |
          package_file="deploy-package/${{ inputs.artifact_name }}.zip"

          if [ ! -f "$package_file" ]; then
            echo "Pacote não encontrado: $package_file"
            exit 1
          fi

          unzip -l "$package_file"

          rm -rf deploy-unpacked
          mkdir -p deploy-unpacked
          unzip -q "$package_file" -d deploy-unpacked

          test -f deploy-unpacked/README.md
          test -f deploy-unpacked/backend/requirements.txt
          test -d deploy-unpacked/frontend/dist
          test -f deploy-unpacked/frontend/dist/index.html

      - name: Montar pacote de deploy
        shell: bash
        run: |
          rm -f deploy-package/deploy-source.tar.gz

          tar -czf deploy-package/deploy-source.tar.gz \
            --exclude=.git \
            --exclude=.venv \
            --exclude=node_modules \
            --exclude=artifacts \
            --exclude=deploy-package \
            --exclude=deploy-unpacked \
            --exclude=frontend/dist \
            --exclude=backend/.env \
            --exclude=frontend/.env \
            .

      - name: Preparar destino no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ inputs.deploy_host }}
          username: ${{ inputs.deploy_user }}
          key: ${{ secrets.DEPLOY_PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            mkdir -p "${{ inputs.deploy_path }}"
            cd "${{ inputs.deploy_path }}"

            backup_dir=".deploy-backup"

            rm -rf "$backup_dir"
            mkdir -p "$backup_dir/backend"

            if [ -f .env ]; then
              mv .env "$backup_dir/.env"
            fi

            if [ -f backend/.env ]; then
              mv backend/.env "$backup_dir/backend/.env"
            fi

            find . -mindepth 1 -maxdepth 1 \
              ! -name "$backup_dir" \
              -exec rm -rf {} +

      - name: Enviar pacote ao servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ inputs.deploy_host }}
          username: ${{ inputs.deploy_user }}
          key: ${{ secrets.DEPLOY_PROD_SSH_KEY }}
          source: deploy-package/deploy-source.tar.gz
          target: ${{ inputs.deploy_path }}
          strip_components: 1

      - name: Publicar aplicação no servidor
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ inputs.deploy_host }}
          username: ${{ inputs.deploy_user }}
          key: ${{ secrets.DEPLOY_PROD_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            STACK_NAME="sistema-de-pesquisas"
            BACKEND_IMAGE="sistema-de-pesquisas-backend:latest"
            FRONTEND_IMAGE="sistema-de-pesquisas-frontend:latest"

            mkdir -p "${{ inputs.deploy_path }}"
            cd "${{ inputs.deploy_path }}"

            tar -xzf deploy-source.tar.gz

            mkdir -p backend

            cat > backend/.env <<EOF
            DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/sistema_de_pesquisas
            DEBUG=false
            JWT_SECRET_KEY=change-this-secret-for-production
            CORS_ALLOW_ORIGINS=https://systemrh.wasion.com.br

            LDAP_ENABLED=${{ vars.LDAP_ENABLED }}
            LDAP_SERVER_URI=${{ vars.LDAP_SERVER_URI }}
            LDAP_USER_BASE_DN=${{ vars.LDAP_USER_BASE_DN }}
            LDAP_BIND_DN=${{ vars.LDAP_BIND_DN }}
            LDAP_BIND_PASSWORD=${{ secrets.LDAP_BIND_PASSWORD }}
            EOF

            rm -rf .deploy-backup deploy-source.tar.gz

            if ! docker info --format '{{.Swarm.LocalNodeState}} {{.Swarm.ControlAvailable}}' | grep -Eq '^active true$'; then
              echo 'Este servidor não está ativo como manager do Swarm'
              exit 1
            fi

            echo "Construindo imagem do backend sem Docker Compose..."
            docker build --no-cache \
              --target backend \
              -t "$BACKEND_IMAGE" \
              -f Dockerfile \
              .

            echo "Construindo imagem do frontend sem Docker Compose..."
            docker build --no-cache \
              --target frontend \
              --build-arg VITE_API_URL=/api/v1 \
              -t "$FRONTEND_IMAGE" \
              -f Dockerfile \
              .

            echo "Publicando stack no Docker Swarm..."
            docker stack deploy \
              --with-registry-auth \
              --prune \
              -c docker-compose.yml \
              "$STACK_NAME"

            echo "Forçando recriação dos serviços backend e frontend..."
            docker service update --force "${STACK_NAME}_backend"
            docker service update --force "${STACK_NAME}_frontend"

            echo "Serviços da stack:"
            docker stack services "$STACK_NAME"

            echo "Validando labels das imagens:"
            docker image inspect "$BACKEND_IMAGE" --format '{{json .Config.Labels}}'
            docker image inspect "$FRONTEND_IMAGE" --format '{{json .Config.Labels}}'

      - name: Resumo do deploy
        shell: bash
        run: |
          {
            echo '## Deploy direto no servidor concluido'
            echo ''
            echo "- Ambiente: ${{ needs.environment.outputs.environment }}"
            echo "- Servidor: ${{ inputs.deploy_host }}"
            echo "- Caminho: ${{ inputs.deploy_path }}"
            echo "- Stack: sistema-de-pesquisas"
          } >> "$GITHUB_STEP_SUMMARY"