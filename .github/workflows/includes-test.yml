name: Validar projeto

on:
  workflow_call:
    inputs:
      environment:
        description: 'Nome do ambiente'
        required: true
        type: string
      python_version:
        description: 'Versão do Python'
        required: false
        type: string
        default: '3.12'
      node_version:
        description: 'Versão do Node.js'
        required: false
        type: string
        default: '20'
    outputs:
      test_result:
        description: 'Resultado da validação'
        value: ${{ jobs.validate.result }}

jobs:
  environment:
    name: Preparar ambiente
    uses: ./.github/workflows/includes-environment.yml
    with:
      environment: ${{ inputs.environment }}

  validate:
    name: Validar backend e frontend
    runs-on: ubuntu-latest
    needs: environment
    timeout-minutes: 20
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Instalar dependências do backend
        working-directory: backend
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-cov

      - name: Validar backend
        working-directory: backend
        shell: bash
        run: |
          python -m compileall app seed.py
          python -c "from app.main import app; print(app.title)"

          if find tests -name '*.py' ! -name '__init__.py' -print -quit | grep -q .; then
            pytest --maxfail=1 --disable-warnings --cov=. --cov-report=term-missing
          else
            echo 'Nenhum teste automatizado encontrado no backend; validação de import concluída.'
          fi

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        shell: bash
        run: npm ci --no-audit --no-fund

      - name: Build do frontend
        working-directory: frontend
        shell: bash
        run: npm run build

      - name: Resumo da validação
        shell: bash
        run: |
          {
            echo '## Validação concluída'
            echo ''
            echo "- Ambiente: ${{ needs.environment.outputs.environment }}"
            echo "- Backend: compile/import ok"
            echo "- Frontend: build ok"
          } >> "$GITHUB_STEP_SUMMARY"