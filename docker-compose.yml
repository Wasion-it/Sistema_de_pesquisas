services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema-de-pesquisas-postgres
    environment:
      POSTGRES_DB: sistema_de_pesquisas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_de_pesquisas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - pesquisas_internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: sistema-de-pesquisas-backend
    env_file:
      - ./backend/.env
    command: >-
      sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/sistema_de_pesquisas
      DEBUG: "false"
      JWT_SECRET_KEY: change-this-secret-for-production
      CORS_ALLOW_ORIGINS: http://systemrh.wasion.com.com
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - pesquisas_internal
      - controle_overlay
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=controle_overlay"
      - "traefik.http.routers.pesquisas-api.rule=Host(`systemrh.wasion.com.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.pesquisas-api.entrypoints=web"
      - "traefik.http.routers.pesquisas-api.priority=100"
      - "traefik.http.services.pesquisas-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_URL: /api/v1
    container_name: sistema-de-pesquisas-frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - controle_overlay
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=controle_overlay"
      - "traefik.http.routers.pesquisas.rule=Host(`systemrh.wasion.com.com`)"
      - "traefik.http.routers.pesquisas.entrypoints=web"
      - "traefik.http.routers.pesquisas.priority=10"
      - "traefik.http.services.pesquisas.loadbalancer.server.port=80"

volumes:
  postgres-data:

networks:
  controle_overlay:
    external: true

  pesquisas_internal:
    driver: bridge