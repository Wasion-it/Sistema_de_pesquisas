version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sistema_de_pesquisas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pesquisas_internal
    deploy:
      replicas: 1

  backend:
    image: sistema-de-pesquisas-backend:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/sistema_de_pesquisas
      DEBUG: "false"
      JWT_SECRET_KEY: change-this-secret-for-production
      CORS_ALLOW_ORIGINS: https://systemrh.wasion.com.br
    command: >-
      sh -c "python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - pesquisas_internal
      - controle_overlay
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=controle_overlay"

        - "traefik.http.routers.pesquisas-api.rule=Host(`systemrh.wasion.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.pesquisas-api.entrypoints=websecure"
        - "traefik.http.routers.pesquisas-api.tls=true"
        - "traefik.http.routers.pesquisas-api.priority=100"

        - "traefik.http.services.pesquisas-api.loadbalancer.server.port=8000"

  frontend:
    image: sistema-de-pesquisas-frontend:latest
    networks:
      - controle_overlay
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=controle_overlay"

        - "traefik.http.routers.pesquisas.rule=Host(`systemrh.wasion.com.br`)"
        - "traefik.http.routers.pesquisas.entrypoints=websecure"
        - "traefik.http.routers.pesquisas.tls=true"
        - "traefik.http.routers.pesquisas.priority=10"

        - "traefik.http.services.pesquisas.loadbalancer.server.port=80"

volumes:
  postgres-data:

networks:
  controle_overlay:
    external: true

  pesquisas_internal:
    driver: overlay