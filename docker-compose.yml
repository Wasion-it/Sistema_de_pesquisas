services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: sistema-de-pesquisas-backend
    environment:
      DATABASE_URL: sqlite:////data/rh_surveys.db
      DEBUG: "true"
      JWT_SECRET_KEY: change-this-secret-for-development
    volumes:
      - ./backend:/app/backend
      - backend-data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: sistema-de-pesquisas-frontend
    environment:
      VITE_API_URL: http://127.0.0.1:8000/api/v1
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
  frontend-node-modules: